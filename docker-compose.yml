services:
  stocktracker:
    build:
      context: .
      dockerfile: Dockerfile
    image: stocktracker:local
    container_name: stocktracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      FINANCE_SQLITE_PATH: /app/data/finance.sqlite
    volumes:
      - stocktracker-data:/app/data

volumes:
  stocktracker-data:
