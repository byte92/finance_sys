name: stocktracker

services:
  stocktracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: stocktracker:local
    container_name: stocktracker
    restart: unless-stopped
    init: true
    shm_size: "1gb"
    ports:
      - "${HOST_PORT:-3218}:3218"
    env_file:
      - path: ../.env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3218
      FINANCE_SQLITE_PATH: /app/data/finance.sqlite
    volumes:
      - stocktracker-data:/app/data

volumes:
  stocktracker-data:
    name: stocktracker-data
